spring:
  application:
    name: inventory-service          # Service identity — Config Server uses this to serve inventory-service.yml

  config:
    import: "optional:configserver:http://localhost:8888"   # Fetch remote config on startup

  cloud:
    config:
      username: config-admin         # Config Server basic auth
      password: config-secret-2024

  datasource:
    url: jdbc:postgresql://localhost:5433/inventory_db
    username: oms_user
    password: oms_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop          # Auto creates tables on start, drops on stop
    show-sql: true                   # Prints SQL queries to console
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always