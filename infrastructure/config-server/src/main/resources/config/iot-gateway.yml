server:
  port: 8086

spring:
  application:
    name: iot-gateway
  datasource:
    url: jdbc:postgresql://localhost:5437/iot_db
    username: oms_user
    password: oms_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop

kafka:
  consumer:
    group-id: iot-gateway-group
  topics:
    sensor-temperature: sensor.temperature
    sensor-weight: sensor.weight
    iot-alert: iot.alert

mqtt:
  broker-url: tcp://localhost:1883
  client-id: oms-iot-gateway