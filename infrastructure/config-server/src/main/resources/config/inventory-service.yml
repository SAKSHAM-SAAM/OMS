server:
  port: 8082

spring:
  application:
    name: inventory-service
  datasource:
    url: jdbc:postgresql://localhost:5433/inventory_db
    username: oms_user
    password: oms_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

kafka:
  consumer:
    group-id: inventory-service-group
  topics:
    inventory-reserved: inventory.reserved
    inventory-insufficient: inventory.insufficient
    inventory-restocked: inventory.restocked